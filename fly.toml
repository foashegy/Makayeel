# fly.toml — Makayeel Telegram bot worker
# Hybrid: polling by default + ready to flip to webhook by setting
# TELEGRAM_WEBHOOK_URL=https://makayeel-bot.fly.dev as a Fly secret.

app = 'makayeel-bot'
primary_region = 'cdg'

[build]
  dockerfile = 'apps/bot/Dockerfile'

[env]
  NODE_ENV = 'production'
  TZ = 'Africa/Cairo'
  PORT = '8080'

# Always-on health-check + webhook-receiver. /healthz returns 200 in both
# polling and webhook modes; /telegram/webhook handles updates only when
# TELEGRAM_WEBHOOK_URL is set.
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = '10s'
  interval = '30s'
  method = 'GET'
  path = '/healthz'
  protocol = 'http'
  timeout = '5s'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512

[deploy]
  strategy = 'immediate'
