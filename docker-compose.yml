services:
  postgres:
    image: postgres:16-alpine
    container_name: makayeel-postgres
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: makayeel
    volumes:
      - makayeel-pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d makayeel']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  makayeel-pg:
